# openspec/config.yaml
# Auto-generated by sdd-init
schema: spec-driven

context: |
  Project: masapp — Gestión de Ventas (monousuario, ventas a crédito)
  Stack: Next.js 16 (App Router), React 19.2, TypeScript 5 strict, Prisma 7 + PostgreSQL, Tailwind CSS 4, NextAuth.js JWT, Lucide React
  Architecture: App Router with layout nesting, server components, API routes under app/api/
  Models: User, Cliente, Producto, Venta, VentaItem, Abono
  Conventions: UUID primary keys, Decimal for monetary fields, snake_case DB columns via Prisma, mobile-first design
  Business rules: Venta a crédito con abonos, estado automático (pendiente/parcial/pagada), stock se descuenta al crear venta, precios se congelan al momento de venta

rules:
  proposal:
    - Include scope boundaries and business rule impact
    - Keep proposals under 300 words
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include data flow for DB operations
    - Document component tree changes
    - Mention error/loading/empty states
  tasks:
    - Group by module, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns (UUID PKs, Prisma queries, Decimal types)
    - Run `npm run prisma:generate` after schema changes
    tdd: true
    test_command: "npm test"
  verify:
    test_command: "npm test"
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

